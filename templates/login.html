<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — AI Runner</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
  --accent: #6c8ef7; --accent2: #a78bfa;
  --danger: #f87171; --success: #34d399;
  --text: #e2e8f0; --muted: #7c8ca0; --border: #2d3555;
  --font: 'JetBrains Mono', 'Fira Code', monospace;
  --sans: system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans);
       font-size: 14px; min-height: 100vh; display: flex;
       align-items: center; justify-content: center; }
.login-box { background: var(--surface); border: 1px solid var(--border);
             border-radius: 12px; padding: 36px 40px; width: 360px; }
.brand { font-family: var(--font); font-weight: 700; font-size: 18px;
         color: var(--accent2); text-align: center; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 12px; color: var(--muted);
        margin-bottom: 6px; font-weight: 500; }
input { width: 100%; background: var(--bg); border: 1px solid var(--border);
        color: var(--text); padding: 9px 12px; border-radius: 6px;
        font-size: 13px; font-family: inherit; transition: border .15s; }
input:focus { outline: none; border-color: var(--accent); }
.btn { display: block; width: 100%; padding: 9px; border-radius: 6px;
       font-size: 13px; font-weight: 600; cursor: pointer; border: none;
       background: var(--accent); color: #fff; margin-top: 20px;
       transition: background .15s; }
.btn:hover { background: #5a7ef5; }
.alert { padding: 9px 14px; border-radius: 6px; margin-bottom: 16px;
         font-size: 12px; background: #3b1a1a; color: var(--danger);
         border: 1px solid #5a2525; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">⚡ AI Runner</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="post">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autofocus autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Sign in</button>
  </form>
</div>
</body>
</html>
